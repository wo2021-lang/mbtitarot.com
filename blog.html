<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a1a">
    <title>블로그 - Mystical Orion MBTI 타로 | 타로 이야기, 운세 칼럼</title>
    <meta name="description" content="Mystical Orion 블로그. 타로 카드 해석, MBTI 운세 칼럼, 사주팔자 이야기, 별자리 운세 등 다양한 점술 콘텐츠를 만나보세요.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://mbtitarot.com/blog.html">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: var(--bg-primary); min-height: 100vh; }
        .static-page { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }
        .static-page .back-home { display: inline-block; color: var(--gold); text-decoration: none; margin-bottom: 16px; font-size: 0.9rem; }
        .static-page .back-home:hover { color: var(--gold-light); }
        .static-page h1 { color: var(--gold-light); font-family: var(--font-serif); font-size: 1.5rem; margin-bottom: 8px; text-align: center; }
        .blog-desc { color: var(--text-secondary); text-align: center; font-size: 0.85rem; margin-bottom: 24px; }

        /* 글쓰기 버튼 */
        .blog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .blog-header h1 { margin-bottom: 0; flex: 1; }
        .btn-write {
            padding: 10px 20px; border-radius: 10px; border: none;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            color: #000; font-weight: bold; font-size: 0.85rem; cursor: pointer;
            white-space: nowrap;
        }
        .btn-write:hover { filter: brightness(1.1); }

        .blog-list { list-style: none; padding: 0; }
        .blog-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s;
        }
        .blog-item:hover {
            border-color: var(--gold-dark);
            transform: translateY(-2px);
        }
        .blog-item-title {
            color: var(--gold-light);
            font-size: 1.05rem;
            font-weight: bold;
            margin-bottom: 8px;
            font-family: var(--font-serif);
        }
        .blog-item-summary {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .blog-item-meta {
            color: var(--text-dim);
            font-size: 0.75rem;
        }
        .blog-item-tag {
            display: inline-block;
            background: rgba(201,162,39,0.1);
            color: var(--gold);
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-right: 4px;
        }

        /* 글 상세 보기 */
        .blog-detail { display: none; }
        .blog-detail.active { display: block; }
        .blog-detail-title {
            color: var(--gold-light);
            font-family: var(--font-serif);
            font-size: 1.4rem;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .blog-detail-meta {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .blog-detail-content {
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.8;
            word-break: keep-all;
        }
        .blog-detail-content p { margin-bottom: 16px; }
        .blog-detail-content h2 { color: var(--gold-light); font-size: 1.15rem; margin: 24px 0 12px; }
        .blog-detail-content h3 { color: var(--gold); font-size: 1.05rem; margin: 20px 0 10px; }
        .blog-back-btn {
            display: inline-block;
            color: var(--gold);
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .blog-back-btn:hover { color: var(--gold-light); }
        .blog-detail-actions { margin-top: 24px; display: flex; gap: 8px; }
        .blog-detail-actions button {
            padding: 8px 16px; border-radius: 8px; border: none;
            font-size: 0.8rem; cursor: pointer;
        }
        .btn-edit-post { background: var(--accent-indigo); color: #fff; }
        .btn-del-post { background: transparent; border: 1px solid var(--accent-rose) !important; color: var(--accent-rose); }

        .blog-empty {
            text-align: center;
            color: var(--text-dim);
            padding: 60px 0;
            font-size: 0.9rem;
        }
        .blog-loading {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 0;
        }

        /* 글쓰기 에디터 */
        .blog-editor { display: none; }
        .blog-editor.active { display: block; }
        .editor-form .form-group { margin-bottom: 16px; }
        .editor-form .form-group label {
            display: block; color: var(--gold); font-size: 0.85rem;
            margin-bottom: 6px; font-weight: bold;
        }
        .editor-form .form-group input,
        .editor-form .form-group textarea {
            width: 100%; padding: 10px 12px; border-radius: 8px;
            border: 1px solid var(--border-subtle); background: var(--bg-card);
            color: var(--text-primary); font-size: 0.9rem; font-family: var(--font-sans);
        }
        .editor-form .form-group textarea { min-height: 300px; resize: vertical; line-height: 1.7; }
        .editor-form .form-group small { color: var(--text-dim); font-size: 0.75rem; }
        .editor-actions { display: flex; gap: 8px; margin-top: 12px; }
        .btn-publish {
            flex: 1; padding: 14px; border-radius: 10px; border: none;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            color: #000; font-weight: bold; font-size: 1rem; cursor: pointer;
        }
        .btn-publish:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-cancel {
            padding: 14px 24px; border-radius: 10px;
            border: 1px solid var(--border-subtle); background: var(--bg-secondary);
            color: var(--text-secondary); font-size: 0.9rem; cursor: pointer;
        }

        /* 비밀번호 모달 */
        .pw-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .pw-modal.active { display: flex; }
        .pw-modal-box {
            background: var(--bg-secondary); border: 1px solid var(--border-subtle);
            border-radius: 16px; padding: 32px 24px; text-align: center;
            max-width: 320px; width: 90%;
        }
        .pw-modal-box h3 { color: var(--gold-light); margin-bottom: 16px; font-size: 1rem; }
        .pw-modal-box input {
            width: 100%; padding: 12px; border-radius: 8px;
            border: 1px solid var(--border-subtle); background: var(--bg-card);
            color: var(--text-primary); font-size: 1rem; margin-bottom: 12px;
            text-align: center;
        }
        .pw-modal-box .pw-btns { display: flex; gap: 8px; }
        .pw-modal-box .pw-btns button {
            flex: 1; padding: 10px; border-radius: 8px; border: none;
            font-size: 0.9rem; cursor: pointer;
        }
        .pw-ok { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #000; font-weight: bold; }
        .pw-cancel { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border-subtle) !important; }

        .msg-toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--gold); color: #000; padding: 10px 24px;
            border-radius: 8px; font-size: 0.9rem; font-weight: bold;
            display: none; z-index: 9999;
        }
    </style>
</head>
<body>

<div id="msg-toast" class="msg-toast"></div>

<!-- 비밀번호 모달 -->
<div id="pw-modal" class="pw-modal">
    <div class="pw-modal-box">
        <h3>🔒 관리자 비밀번호</h3>
        <input type="password" id="admin-pw" placeholder="비밀번호 입력" onkeypress="if(event.key==='Enter')checkPassword()">
        <div class="pw-btns">
            <button class="pw-cancel" onclick="closePwModal()">취소</button>
            <button class="pw-ok" onclick="checkPassword()">확인</button>
        </div>
    </div>
</div>

<div class="static-page">
    <a href="/" class="back-home">← 홈으로 돌아가기</a>

    <!-- 글 목록 -->
    <div id="blog-list-view">
        <div class="blog-header">
            <h1>✨ 블로그</h1>
            <button class="btn-write" onclick="onWriteClick()">✍ 글쓰기</button>
        </div>
        <p class="blog-desc">세상의 모든 이야기를 담는 블로그</p>
        <div id="blog-loading" class="blog-loading">로딩 중...</div>
        <ul id="blog-list" class="blog-list"></ul>
        <div id="blog-empty" class="blog-empty" style="display:none;">
            아직 게시글이 없습니다.<br>곧 흥미로운 글이 올라올 예정이에요! 🌙
        </div>
    </div>

    <!-- 글 상세 -->
    <div id="blog-detail-view" class="blog-detail">
        <span class="blog-back-btn" onclick="showBlogList()">← 목록으로</span>
        <h1 class="blog-detail-title" id="detail-title"></h1>
        <div class="blog-detail-meta" id="detail-meta"></div>
        <div class="blog-detail-content" id="detail-content"></div>
        <div class="blog-detail-actions" id="detail-actions" style="display:none;">
            <button class="btn-edit-post" onclick="editCurrentPost()">수정</button>
            <button class="btn-del-post" onclick="deleteCurrentPost()">삭제</button>
        </div>
    </div>

    <!-- 글쓰기 에디터 -->
    <div id="blog-editor-view" class="blog-editor">
        <span class="blog-back-btn" onclick="cancelEditor()">← 돌아가기</span>
        <h1 id="editor-title-label">✍ 새 글 쓰기</h1>
        <div class="editor-form">
            <input type="hidden" id="edit-id" value="">
            <div class="form-group">
                <label>제목</label>
                <input type="text" id="post-title" placeholder="글 제목을 입력하세요">
            </div>
            <div class="form-group">
                <label>요약 (목록에 표시)</label>
                <input type="text" id="post-summary" placeholder="한 줄 요약">
            </div>
            <div class="form-group">
                <label>태그 (쉼표로 구분)</label>
                <input type="text" id="post-tags" placeholder="예: 타로, MBTI, 운세">
            </div>
            <div class="form-group">
                <label>작성자</label>
                <input type="text" id="post-author" placeholder="작성자 이름" value="Mystical Orion">
            </div>
            <div class="form-group">
                <label>본문</label>
                <textarea id="post-content" placeholder="본문을 작성하세요.&#10;&#10;## 소제목은 ##으로 시작&#10;### 작은 제목은 ###으로 시작&#10;&#10;빈 줄로 단락을 구분합니다."></textarea>
                <small>## 소제목, ### 작은제목, 빈 줄로 단락 구분</small>
            </div>
            <div class="editor-actions">
                <button class="btn-cancel" onclick="cancelEditor()">취소</button>
                <button class="btn-publish" id="btn-save" onclick="savePost()">게시하기</button>
            </div>
        </div>
    </div>
</div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-blog.js"></script>

<script>
var ADMIN_PASSWORD = '1127';
var isAdmin = false;
var currentPostId = null;

// ── 비밀번호 처리 ──
function onWriteClick() {
    if (isAdmin) {
        showEditor();
    } else {
        document.getElementById('pw-modal').classList.add('active');
        document.getElementById('admin-pw').value = '';
        document.getElementById('admin-pw').focus();
    }
}

function checkPassword() {
    var pw = document.getElementById('admin-pw').value;
    if (pw === ADMIN_PASSWORD) {
        isAdmin = true;
        closePwModal();
        showEditor();
        showToast('관리자 인증 완료!');
    } else {
        alert('비밀번호가 틀렸습니다.');
    }
}

function closePwModal() {
    document.getElementById('pw-modal').classList.remove('active');
}

// ── 화면 전환 ──
function showBlogList() {
    document.getElementById('blog-list-view').style.display = 'block';
    document.getElementById('blog-detail-view').classList.remove('active');
    document.getElementById('blog-editor-view').classList.remove('active');
}

function showEditor(editMode) {
    document.getElementById('blog-list-view').style.display = 'none';
    document.getElementById('blog-detail-view').classList.remove('active');
    document.getElementById('blog-editor-view').classList.add('active');
    if (!editMode) {
        clearForm();
        document.getElementById('editor-title-label').textContent = '✍ 새 글 쓰기';
    }
}

function cancelEditor() {
    document.getElementById('blog-editor-view').classList.remove('active');
    document.getElementById('blog-list-view').style.display = 'block';
}

// ── 글 목록 ──
function renderBlogList() {
    loadBlogPosts(function(posts) {
        var loading = document.getElementById('blog-loading');
        var list = document.getElementById('blog-list');
        var empty = document.getElementById('blog-empty');
        loading.style.display = 'none';

        if (posts.length === 0) {
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        var html = '';
        for (var i = 0; i < posts.length; i++) {
            var p = posts[i];
            var tags = '';
            if (p.tags) {
                for (var t = 0; t < p.tags.length; t++) {
                    tags += '<span class="blog-item-tag">' + p.tags[t] + '</span>';
                }
            }
            html += '<li class="blog-item" onclick="showBlogDetail(\'' + p.id + '\')">'
                + '<div class="blog-item-title">' + escapeHtml(p.title) + '</div>'
                + '<div class="blog-item-summary">' + escapeHtml(p.summary || '') + '</div>'
                + '<div class="blog-item-meta">' + tags + ' ' + formatDate(p.createdAt) + '</div>'
                + '</li>';
        }
        list.innerHTML = html;
    });
}

// ── 글 상세 ──
function showBlogDetail(postId) {
    currentPostId = postId;
    loadBlogPost(postId, function(post) {
        if (!post) { alert('글을 찾을 수 없습니다.'); return; }
        document.getElementById('detail-title').textContent = post.title;
        document.getElementById('detail-meta').innerHTML =
            formatDate(post.createdAt) + (post.author ? ' · ' + escapeHtml(post.author) : '');

        var content = post.content || '';
        var paragraphs = content.split('\n\n');
        var contentHtml = '';
        for (var i = 0; i < paragraphs.length; i++) {
            var para = paragraphs[i].trim();
            if (!para) continue;
            if (para.indexOf('## ') === 0) {
                contentHtml += '<h2>' + escapeHtml(para.substring(3)) + '</h2>';
            } else if (para.indexOf('### ') === 0) {
                contentHtml += '<h3>' + escapeHtml(para.substring(4)) + '</h3>';
            } else {
                contentHtml += '<p>' + escapeHtml(para).replace(/\n/g, '<br>') + '</p>';
            }
        }
        document.getElementById('detail-content').innerHTML = contentHtml;

        // 관리자면 수정/삭제 버튼 표시
        document.getElementById('detail-actions').style.display = isAdmin ? 'flex' : 'none';

        document.getElementById('blog-list-view').style.display = 'none';
        document.getElementById('blog-detail-view').classList.add('active');
    });
}

// ── 글 저장 ──
function savePost() {
    var title = document.getElementById('post-title').value.trim();
    var summary = document.getElementById('post-summary').value.trim();
    var tags = document.getElementById('post-tags').value.trim();
    var author = document.getElementById('post-author').value.trim();
    var content = document.getElementById('post-content').value.trim();
    var editId = document.getElementById('edit-id').value;

    if (!title || !content) {
        alert('제목과 본문은 필수입니다.');
        return;
    }

    var postData = {
        title: title,
        summary: summary,
        tags: tags ? tags.split(',').map(function(t) { return t.trim(); }) : [],
        author: author || 'Mystical Orion',
        content: content
    };

    document.getElementById('btn-save').disabled = true;

    if (editId) {
        updateBlogPost(editId, postData, function(ok) {
            document.getElementById('btn-save').disabled = false;
            if (ok) {
                showToast('글이 수정되었습니다!');
                cancelEditor();
                renderBlogList();
            } else {
                alert('수정 실패. 다시 시도해주세요.');
            }
        });
    } else {
        saveBlogPost(postData, function(ok, id) {
            document.getElementById('btn-save').disabled = false;
            if (ok) {
                showToast('글이 게시되었습니다!');
                cancelEditor();
                renderBlogList();
            } else {
                alert('저장 실패. 다시 시도해주세요.');
            }
        });
    }
}

// ── 수정 ──
function editCurrentPost() {
    if (!currentPostId) return;
    loadBlogPost(currentPostId, function(post) {
        if (!post) return;
        document.getElementById('edit-id').value = currentPostId;
        document.getElementById('post-title').value = post.title || '';
        document.getElementById('post-summary').value = post.summary || '';
        document.getElementById('post-tags').value = (post.tags || []).join(', ');
        document.getElementById('post-author').value = post.author || '';
        document.getElementById('post-content').value = post.content || '';
        document.getElementById('btn-save').textContent = '수정하기';
        document.getElementById('editor-title-label').textContent = '✏️ 글 수정';
        document.getElementById('blog-detail-view').classList.remove('active');
        document.getElementById('blog-editor-view').classList.add('active');
    });
}

// ── 삭제 ──
function deleteCurrentPost() {
    if (!currentPostId) return;
    if (!confirm('정말 삭제하시겠습니까?')) return;
    deleteBlogPost(currentPostId, function(ok) {
        if (ok) {
            showToast('삭제되었습니다.');
            showBlogList();
            renderBlogList();
        } else {
            alert('삭제 실패.');
        }
    });
}

function clearForm() {
    document.getElementById('edit-id').value = '';
    document.getElementById('post-title').value = '';
    document.getElementById('post-summary').value = '';
    document.getElementById('post-tags').value = '';
    document.getElementById('post-content').value = '';
    document.getElementById('post-author').value = 'Mystical Orion';
    document.getElementById('btn-save').textContent = '게시하기';
}

function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function showToast(msg) {
    var t = document.getElementById('msg-toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(function() { t.style.display = 'none'; }, 2000);
}

// URL 파라미터로 특정 글 바로 열기
var urlParams = new URLSearchParams(window.location.search);
var postParam = urlParams.get('post');

renderBlogList();
if (postParam) {
    setTimeout(function() { showBlogDetail(postParam); }, 500);
}
</script>
</body>
</html>
